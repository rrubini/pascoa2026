<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disparador Páscoa 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 15px; }

  header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 16px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 13px; color: #666; margin-top: 2px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e5e5e5; }
  .stat { background: #f5f5f5; border-radius: 10px; padding: 10px 8px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-val.green { color: #16a34a; }
  .stat-val.orange { color: #ea580c; }
  .stat-label { font-size: 11px; color: #666; margin-top: 2px; }

  .search-wrap { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e5e5; }
  .search-wrap input { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px 14px; font-size: 15px; background: #f9f9f9; outline: none; }
  .search-wrap input:focus { border-color: #4f46e5; background: #fff; }

  .warn-bar { margin: 10px 16px 0; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px; padding: 10px 12px; font-size: 13px; color: #9a3412; }

  .list { padding: 10px 16px 80px; }

  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: background 0.15s; }
  .card.sent { background: #f0fdf4; border-color: #bbf7d0; }
  .card.warn-num { border-color: #fed7aa; }

  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #e0e7ff; color: #4338ca; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card.sent .avatar { background: #dcfce7; color: #16a34a; }

  .info { flex: 1; min-width: 0; }
  .info-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info-sub { font-size: 12px; color: #777; margin-top: 1px; }
  .warn-tag { font-size: 11px; color: #ea580c; margin-left: 5px; }

  .btn-wa { background: #25d366; color: #fff; border: none; border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-wa.done { background: #d1fae5; color: #065f46; }

  .empty { text-align: center; color: #999; font-size: 14px; padding: 40px 0; }

  .footer-count { text-align: center; font-size: 12px; color: #aaa; padding: 8px 0 4px; }

  .fab { position: fixed; bottom: 20px; right: 16px; background: #4f46e5; color: #fff; border: none; border-radius: 28px; padding: 13px 20px; font-size: 14px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 12px rgba(79,70,229,0.35); z-index: 20; }
  .fab:active { transform: scale(0.97); }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 30; align-items: flex-end; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 34px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: #666; margin-bottom: 12px; }
  .modal textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; outline: none; line-height: 1.5; }
  .modal textarea:focus { border-color: #4f46e5; }
  .modal-preview { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 12px; margin-top: 12px; font-size: 13px; line-height: 1.6; color: #14532d; white-space: pre-wrap; word-break: break-word; }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
  .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
  .btn-cancel { background: #f3f4f6; color: #374151; }
  .btn-save { background: #4f46e5; color: #fff; }
</style>
</head>
<body>

  <p id="header-sub">Ministério Alpha</p>

  <div class="stat"><div class="stat-val orange" id="s-pending">0</div><div class="stat-label">pendentes</div></div>
</div>

<div class="search-wrap">
  <input type="search" id="search" placeholder="Buscar por nome, telefone ou REG..." oninput="renderList()" />
</div>

<div id="warn-bar" class="warn-bar" style="display:none"></div>

<div class="list" id="list"></div>
<div class="footer-count" id="footer-count"></div>

<button class="fab" onclick="openModal()">Editar mensagem</button>

<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">

    <h2>Mensagem</h2>
    <p>Use <code>[Nome]</code> para o primeiro nome e <code>[REG]</code> para o número de cadastro.</p>
    <textarea id="msg-editor" rows="9" oninput="updatePreview()"></textarea>
    <div class="modal-preview" id="msg-preview"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveMsg()">Salvar</button>
    </div>
  </div>
</div>

const DEFAULT_MSG = `Olá [Nome]!
Você se cadastrou no *Evento de Páscoa 2026 - DISTRIBUIÇÃO DE 1 CAIXA DE BOMBOM para cada criança cadastrada!*
Lembrando que será *AMANHÃ (sábado) ÀS 9 HORAS*, lá no Ministério Alpha, na Av. Engenheiro Souza Filho, 3555 (Ao lado da casa de festas Malibu). 

*Lembre-se:* 📌
1) Ao chegar, informe seu número de cadastro: [REG].
2) As crianças só entram acompanhadas.
3) Leve o documento que comprove a idade (certidão ou identidade).

Não se atrase, contamos com a sua presença e a de seus filhos! 
Até amanhã!`;

let currentMsg = DEFAULT_MSG;
const sent = new Set();

function toWANumber(phone) {
  const d = phone.replace(/\D/g, '');
  if (d.startsWith('55')) return d;
  return '55' + d;
}

function isWarn(phone) {
  const d = phone.replace(/\D/g, '');
  if (d.startsWith('55')) return d.slice(2).length < 10;
  return d.length < 10 || d.length > 11;
}

function initials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function buildMsg(c) {
  return currentMsg
    .replace('[Nome]', c.name.split(' ')[0])
    .replace('[REG]', c.reg);
}

function openWA(reg) {
  const c = CONTACTS.find(x => x.reg === reg);
  if (!c) return;
  const num = toWANumber(c.phone);
  const text = encodeURIComponent(buildMsg(c));
  window.open(`https://wa.me/${num}?text=${text}`, '_blank');
  sent.add(reg);
  updateStats();
  const btn = document.getElementById('btn-' + reg);
  const card = document.getElementById('card-' + reg);
  if (btn) { btn.textContent = 'Aberto'; btn.classList.add('done'); }
  if (card) card.classList.add('sent');
}

function updateStats() {
  document.getElementById('s-total').textContent = CONTACTS.length;
  document.getElementById('s-sent').textContent = sent.size;
  document.getElementById('s-pending').textContent = CONTACTS.length - sent.size;
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = CONTACTS.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.phone.includes(q) ||
    c.reg.toLowerCase().includes(q)
  );

  const warnings = CONTACTS.filter(c => isWarn(c.phone));
  const wbar = document.getElementById('warn-bar');
  if (warnings.length && !q) {
    wbar.style.display = 'block';
    wbar.textContent = `⚠ ${warnings.length} número(s) com formato suspeito: ${warnings.map(c => c.reg).join(', ')}`;
  } else {
    wbar.style.display = 'none';
  }

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Nenhum contato encontrado.</div>';
    document.getElementById('footer-count').textContent = '';
    return;
  }

  list.innerHTML = filtered.map(c => {
    const isSent = sent.has(c.reg);
    const warn = isWarn(c.phone);
    return `
      <div class="card${isSent ? ' sent' : ''}${warn ? ' warn-num' : ''}" id="card-${c.reg}">
        <div class="avatar">${initials(c.name)}</div>
        <div class="info">
          <div class="info-name">${c.name}${warn ? '<span class="warn-tag">⚠</span>' : ''}</div>
          <div class="info-sub">${c.phone} · ${c.reg}</div>
        </div>
        <button class="btn-wa${isSent ? ' done' : ''}" id="btn-${c.reg}" onclick="openWA('${c.reg}')">
          ${isSent ? 'Aberto' : 'Enviar'}
        </button>
      </div>`;
  }).join('');

  document.getElementById('footer-count').textContent =
    `${filtered.length} de ${CONTACTS.length} contatos`;
}

function openModal() {
  document.getElementById('msg-editor').value = currentMsg;
  updatePreview();
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function bgClick(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

function updatePreview() {
  const val = document.getElementById('msg-editor').value;
  const sample = CONTACTS[0];
  document.getElementById('msg-preview').textContent =
    val.replace('[Nome]', sample.name.split(' ')[0]).replace('[REG]', sample.reg);
}

function saveMsg() {
  currentMsg = document.getElementById('msg-editor').value;
  closeModal();
}

updateStats();
renderList();
</script>
