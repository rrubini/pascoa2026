<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disparador Páscoa 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 15px; }

  header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 16px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 13px; color: #666; margin-top: 2px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e5e5e5; }
  .stat { background: #f5f5f5; border-radius: 10px; padding: 10px 8px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-val.green { color: #16a34a; }
  .stat-val.orange { color: #ea580c; }
  .stat-label { font-size: 11px; color: #666; margin-top: 2px; }

  .search-wrap { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e5e5; }
  .search-wrap input { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px 14px; font-size: 15px; background: #f9f9f9; outline: none; }
  .search-wrap input:focus { border-color: #4f46e5; background: #fff; }

  .warn-bar { margin: 10px 16px 0; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px; padding: 10px 12px; font-size: 13px; color: #9a3412; }

  .list { padding: 10px 16px 80px; }

  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: background 0.15s; }
  .card.sent { background: #f0fdf4; border-color: #bbf7d0; }
  .card.warn-num { border-color: #fed7aa; }

  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #e0e7ff; color: #4338ca; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card.sent .avatar { background: #dcfce7; color: #16a34a; }

  .info { flex: 1; min-width: 0; }
  .info-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info-sub { font-size: 12px; color: #777; margin-top: 1px; }
  .warn-tag { font-size: 11px; color: #ea580c; margin-left: 5px; }

  .btn-wa { background: #25d366; color: #fff; border: none; border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-wa.done { background: #d1fae5; color: #065f46; }

  .empty { text-align: center; color: #999; font-size: 14px; padding: 40px 0; }

  .footer-count { text-align: center; font-size: 12px; color: #aaa; padding: 8px 0 4px; }

  .fab { position: fixed; bottom: 20px; right: 16px; background: #4f46e5; color: #fff; border: none; border-radius: 28px; padding: 13px 20px; font-size: 14px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 12px rgba(79,70,229,0.35); z-index: 20; }
  .fab:active { transform: scale(0.97); }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 30; align-items: flex-end; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 34px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: #666; margin-bottom: 12px; }
  .modal textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; outline: none; line-height: 1.5; }
  .modal textarea:focus { border-color: #4f46e5; }
  .modal-preview { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 12px; margin-top: 12px; font-size: 13px; line-height: 1.6; color: #14532d; white-space: pre-wrap; word-break: break-word; }
  .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
  .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
  .btn-cancel { background: #f3f4f6; color: #374151; }
  .btn-save { background: #4f46e5; color: #fff; }

  .tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .tab { flex: 1; padding: 10px; border: 1px solid #ddd; background: #f9f9f9; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; color: #666; }
  .tab.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .card.came .avatar { background: #dcfce7; color: #16a34a; }
  .badge-status { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 6px; font-weight: 600; vertical-align: middle; }
  .badge-came { background: #dcfce7; color: #166534; }
  .badge-missed { background: #fef3c7; color: #92400e; }
  .badge-wait { background: #e0e7ff; color: #3730a3; }
  .row-num { min-width: 28px; text-align: right; font-size: 12px; font-weight: 700; color: #999; font-variant-numeric: tabular-nums; margin-right: 4px; }
  .filter-tabs { display: flex; gap: 6px; padding: 0 16px 10px; background: #fff; }
  .filter-tab { flex: 1; padding: 8px; border: 1px solid #ddd; background: #f9f9f9; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; color: #666; }
  .filter-tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .source-tabs { display: flex; gap: 6px; padding: 10px 16px 4px; background: #fff; }
  .source-tab { flex: 1; padding: 11px 8px; border: 1px solid #ddd; background: #f9f9f9; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; }
  .source-tab.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
</style>
</head>
<body>

<header>
  <h1>Páscoa 2026 - Disparador</h1>
  <p id="header-sub">Ministério Alpha</p>
</header>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-label">total</div></div>
  <div class="stat"><div class="stat-val green" id="s-sent">0</div><div class="stat-label">abertos</div></div>
  <div class="stat"><div class="stat-val orange" id="s-pending">0</div><div class="stat-label">pendentes</div></div>
</div>

<div class="source-tabs">
  <button class="source-tab active" id="src-confirmed" onclick="setSource('confirmed')">Confirmados (<span id="src-count-confirmed">0</span>)</button>
  <button class="source-tab" id="src-waitlist" onclick="setSource('waitlist')">Lista de espera (<span id="src-count-waitlist">0</span>)</button>
</div>

<div class="search-wrap">
  <input type="search" id="search" placeholder="Buscar por nome, telefone ou REG..." oninput="renderList()" />
</div>

<div class="filter-tabs">
  <button class="filter-tab active" id="ft-all" onclick="setFilter('all')">Todos</button>
  <button class="filter-tab" id="ft-came" onclick="setFilter('came')">✅ Compareceu</button>
  <button class="filter-tab" id="ft-missed" onclick="setFilter('missed')">⏳ Faltou</button>
</div>
<div id="warn-bar" class="warn-bar" style="display:none"></div>

<div class="list" id="list"></div>
<div class="footer-count" id="footer-count"></div>

<button class="fab" onclick="openModal()">Editar mensagem</button>

<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal">
    <h2>Mensagens</h2>
    <p>Use <code>[Nome]</code> para o primeiro nome. Três mensagens: compareceu, faltou, e lista de espera.</p>

    <div class="tabs">
      <button class="tab active" id="tab-done" onclick="switchTab('done')">✅ Compareceu</button>
      <button class="tab" id="tab-missed" onclick="switchTab('missed')">⏳ Faltou</button>
      <button class="tab" id="tab-wait" onclick="switchTab('wait')">📋 Espera</button>
    </div>

    <textarea id="msg-editor" rows="11" oninput="updatePreview()"></textarea>
    <div class="modal-preview" id="msg-preview"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveMsg()">Salvar</button>
    </div>
  </div>
</div>

const MSG_WAITLIST = `Oi [Nome]!
Aqui é do Ministério Alpha. Vimos que você se interessou pela nossa ação de Páscoa e queremos muito te receber!

Que tal começar com um *CAFÉ DA MANHÃ* amanhã (domingo)? É a nossa forma de dar as boas-vindas a você e sua família à nossa igreja.

*AMANHÃ! Domingo, 12 de Abril*
*Café da manhã das 9h às 10h*
*Av. Engenheiro Souza, 3555* - Ao lado da casa de festas Malibu
Em seguida, um culto especial para as famílias.

Será uma alegria te receber! Responda aqui se puder vir!`;

let currentMsgDone = MSG_DONE;
let currentMsgMissed = MSG_MISSED;
let currentMsgWait = MSG_WAITLIST;
let currentSource = 'confirmed';
const sent = new Set();
let currentFilter = 'all';
let currentTab = 'done';

function getList() {
  return currentSource === 'waitlist' ? WAITLIST_CONTACTS : CONTACTS;
}

function toWANumber(phone) {
  const d = phone.replace(/\D/g, '');
  if (d.startsWith('55')) return d;
  return '55' + d;
}

function isWarn(phone) {
  const d = phone.replace(/\D/g, '');
  if (d.startsWith('55')) return d.slice(2).length < 10;
  return d.length < 10 || d.length > 11;
}

function initials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function buildMsg(c) {
  let template;
  if (c.type === 'waitlist') template = currentMsgWait;
  else template = c.done ? currentMsgDone : currentMsgMissed;
  return template
    .replace('[Nome]', c.name.split(' ')[0])
    .replace('[REG]', c.reg);
}

function openWA(reg) {
  const c = [...CONTACTS, ...WAITLIST_CONTACTS].find(x => x.reg === reg);
  if (!c) return;
  const num = toWANumber(c.phone);
  const text = encodeURIComponent(buildMsg(c));
  window.open(`https://wa.me/${num}?text=${text}`, '_blank');
  sent.add(reg);
  updateStats();
  const btn = document.getElementById('btn-' + reg);
  const card = document.getElementById('card-' + reg);
  if (btn) { btn.textContent = 'Aberto'; btn.classList.add('done'); }
  if (card) card.classList.add('sent');
}

function updateStats() {
  const source = getList();
  document.getElementById('s-total').textContent = source.length;
  const sentInSource = source.filter(c => sent.has(c.reg)).length;
  document.getElementById('s-sent').textContent = sentInSource;
  document.getElementById('s-pending').textContent = source.length - sentInSource;
  const cc = document.getElementById('src-count-confirmed');
  const cw = document.getElementById('src-count-waitlist');
  if (cc) cc.textContent = CONTACTS.length;
  if (cw) cw.textContent = WAITLIST_CONTACTS.length;
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const source = getList();
  const filterBar = document.querySelector('.filter-tabs');
  if (filterBar) filterBar.style.display = currentSource === 'waitlist' ? 'none' : 'flex';
  let filtered = source.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.phone.includes(q) ||
    c.reg.toLowerCase().includes(q)
  );
  if (currentSource === 'confirmed' && currentFilter === 'came')   filtered = filtered.filter(c => c.done);
  if (currentSource === 'confirmed' && currentFilter === 'missed') filtered = filtered.filter(c => !c.done);

  const warnings = source.filter(c => isWarn(c.phone));
  const wbar = document.getElementById('warn-bar');
  if (warnings.length && !q && currentFilter === 'all') {
    wbar.style.display = 'block';
    wbar.textContent = `⚠ ${warnings.length} número(s) com formato suspeito: ${warnings.map(c => c.reg).join(', ')}`;
  } else {
    wbar.style.display = 'none';
  }

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Nenhum contato encontrado.</div>';
    document.getElementById('footer-count').textContent = '';
    return;
  }

  list.innerHTML = filtered.map((c, i) => {
    const isSent = sent.has(c.reg);
    const warn = isWarn(c.phone);
    let badge;
    if (c.type === 'waitlist') badge = '<span class="badge-status badge-wait">Espera</span>';
    else badge = c.done
      ? '<span class="badge-status badge-came">✅ veio</span>'
      : '<span class="badge-status badge-missed">⏳ faltou</span>';
    return `
      <div class="card${isSent ? ' sent' : ''}${c.done ? ' came' : ''}${warn ? ' warn-num' : ''}" id="card-${c.reg}">
        <div class="row-num">${i + 1}</div>
        <div class="avatar">${initials(c.name)}</div>
        <div class="info">
          <div class="info-name">${c.name}${badge}${warn ? '<span class="warn-tag">⚠</span>' : ''}</div>
          <div class="info-sub">${c.phone} · ${c.reg}</div>
        </div>
        <button class="btn-wa${isSent ? ' done' : ''}" id="btn-${c.reg}" onclick="openWA('${c.reg}')">
          ${isSent ? 'Aberto' : 'Enviar'}
        </button>
      </div>`;
  }).join('');

  document.getElementById('footer-count').textContent =
    `${filtered.length} de ${source.length} contatos`;
}

function setSource(s) {
  currentSource = s;
  document.getElementById('src-confirmed').classList.toggle('active', s === 'confirmed');
  document.getElementById('src-waitlist').classList.toggle('active',  s === 'waitlist');
  // Reset filtro came/missed ao trocar de fonte
  currentFilter = 'all';
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  const ftAll = document.getElementById('ft-all'); if (ftAll) ftAll.classList.add('active');
  renderList();
  updateStats();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('ft-' + f).classList.add('active');
  renderList();
}

function openModal() {
  currentTab = 'done';
  document.getElementById('tab-done').classList.add('active');
  document.getElementById('tab-missed').classList.remove('active');
  document.getElementById('tab-wait').classList.remove('active');
  document.getElementById('msg-editor').value = currentMsgDone;
  updatePreview();
  document.getElementById('modal-bg').classList.add('open');
}

function switchTab(tab) {
  if (currentTab === 'done')   currentMsgDone   = document.getElementById('msg-editor').value;
  if (currentTab === 'missed') currentMsgMissed = document.getElementById('msg-editor').value;
  if (currentTab === 'wait')   currentMsgWait   = document.getElementById('msg-editor').value;
  currentTab = tab;
  document.getElementById('tab-done').classList.toggle('active',   tab === 'done');
  document.getElementById('tab-missed').classList.toggle('active', tab === 'missed');
  document.getElementById('tab-wait').classList.toggle('active',   tab === 'wait');
  const val = tab === 'done' ? currentMsgDone : tab === 'missed' ? currentMsgMissed : currentMsgWait;
  document.getElementById('msg-editor').value = val;
  updatePreview();
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function bgClick(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

function updatePreview() {
  const val = document.getElementById('msg-editor').value;
  let sample;
  if (currentTab === 'wait')   sample = WAITLIST_CONTACTS[0] || CONTACTS[0];
  else if (currentTab === 'done') sample = CONTACTS.find(c => c.done) || CONTACTS[0];
  else                         sample = CONTACTS.find(c => !c.done) || CONTACTS[0];
  document.getElementById('msg-preview').textContent =
    val.replace('[Nome]', sample.name.split(' ')[0]).replace('[REG]', sample.reg);
}

function saveMsg() {
  const val = document.getElementById('msg-editor').value;
  if (currentTab === 'done')   currentMsgDone   = val;
  if (currentTab === 'missed') currentMsgMissed = val;
  if (currentTab === 'wait')   currentMsgWait   = val;
  closeModal();
}

updateStats();
renderList();
</script>
